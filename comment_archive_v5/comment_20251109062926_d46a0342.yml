  سلام. من خاطرات همسفر شراب رو خوندم و این خاطرات هم تا اینجا تکرار وبازنویسی همانها بوده - کمی منسجم تر. آیا قراره همینطور ادامه بدین یا محتوای جدید هم اضافه میشه؟
  نکته بعدی کاش درباره حوادث روز هم - قتل جورج فلوید و ... - یه چیزی بنویسین. انگار اصن تو امریکا نیستین!!!
