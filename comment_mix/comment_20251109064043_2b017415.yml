  سلام وقت بخیر
  از سال 99 هر چند وقت یکبار به وبلاگتان سر زده ام به امید اینکه این مطالب را ادامه دهید. برای منی که ارشد کامپیوتر علم و صنعت بودم و خیلی از حرفهای شما حرف دلم بود خیلی راهگشا بودند این مطالب. چرا ادامه نمیدهید؟
